<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'">
  <title>Starting Jarvis</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; overflow: hidden; background: radial-gradient(circle, #06331d 0, #020806 42%, #000 100%); color: #dcfce7; font: 14px "Segoe UI", sans-serif; }
    main { display: grid; justify-items: center; gap: 1rem; text-transform: uppercase; letter-spacing: .24em; }
    .core { width: 5rem; aspect-ratio: 1; border: 1px solid #4ade80; border-radius: 50%; box-shadow: 0 0 30px #22c55e66, inset 0 0 20px #22c55e44; animation: pulse 1.5s ease-in-out infinite; }
    p { color: #86efac; }
    @keyframes pulse { 50% { transform: scale(.88); opacity: .6; } }
  </style>
</head>
<body><main><div class="core"></div><strong>Jarvis is coming online</strong><p>Checking command link</p></main></body>
</html>
