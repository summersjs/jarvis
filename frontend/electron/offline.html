<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'unsafe-inline'; script-src 'self'">
  <title>Jarvis Offline</title>
  <style>
    body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: radial-gradient(circle at 50% 30%, #0b3b23 0, #020806 42%, #000 100%); color: #dcfce7; font: 15px "Segoe UI", sans-serif; }
    main { width: min(38rem, calc(100vw - 4rem)); border: 1px solid #22c55e88; background: #03140cef; padding: 2rem; box-shadow: 0 0 40px #22c55e22, inset 0 0 24px #22c55e0f; }
    .kicker { color: #4ade80; font-size: .72rem; font-weight: 800; letter-spacing: .24em; text-transform: uppercase; }
    h1 { margin: .6rem 0; font-size: clamp(2rem, 7vw, 4rem); letter-spacing: .08em; text-transform: uppercase; }
    p { color: #bbf7d0aa; line-height: 1.55; }
    code { display: block; overflow-wrap: anywhere; border: 1px solid #22c55e33; background: #0008; padding: .8rem; color: #86efac; }
    div { display: flex; gap: .7rem; margin-top: 1.4rem; }
    button { cursor: pointer; border: 1px solid #4ade80; background: #14532d66; color: #dcfce7; padding: .75rem 1rem; font-weight: 800; letter-spacing: .08em; text-transform: uppercase; }
    button:hover { background: #166534aa; box-shadow: 0 0 18px #22c55e44; }
  </style>
</head>
<body><main><span class="kicker">Command link unavailable</span><h1>Jarvis is offline</h1><p>The desktop shell will reconnect automatically. Make sure the Jarvis frontend is running, or retry the connection now.</p><code id="target">Loading target…</code><div><button id="retry">Retry</button><button id="logs">Open logs</button></div></main><script src="./offline.js"></script></body>
</html>
